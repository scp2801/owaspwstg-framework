# ============================================================
# OWASP WSTG Bug Bounty Automation Framework
# Configuration File
# Author: scp2801 | github.com/scp2801/owaspwstg-framework
# ============================================================

framework:
  name: "OWASP WSTG Bug Bounty Framework"
  version: "1.0.0"
  author: "scp2801"

# ── Scan Settings ──────────────────────────────────────────
scan:
  profile: "default"       # default | fast | deep | stealth
  threads: 10              # concurrent threads
  timeout: 30              # request timeout (seconds)
  rate_limit: 50           # requests per second max
  delay: 0.1               # delay between requests (seconds)
  retries: 3               # retry count on failure
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 WSTG-Framework/1.0"
  verify_ssl: false        # verify SSL certificates
  follow_redirects: true
  max_redirects: 5
  vuln_scan: true          # enable vulnerability scanning
  no_crawl: false          # skip web crawling
  screenshots: true        # enable screenshot capture

# ── Output Settings ────────────────────────────────────────
output:
  dir: "reports"
  format: "all"            # html | json | excel | txt | md | all
  timestamp_dirs: true

# ── Recon Settings ─────────────────────────────────────────
recon:
  sources:
    - crtsh
    - alienvault
    - rapiddns
    - webarchive
    - hackertarget
  dns_types:
    - A
    - AAAA
    - MX
    - TXT
    - CNAME
    - NS
  max_subdomains: 5000
  live_host_threads: 20

# ── Crawling Settings ──────────────────────────────────────
crawling:
  max_depth: 3
  max_pages: 500
  extract_js: true
  check_robots: true
  check_sitemap: true
  include_external: false

# ── Vulnerability Modules ──────────────────────────────────
vulnerabilities:
  xss: true
  sqli: true
  ssrf: true
  open_redirect: true
  idor: true
  cors: true
  jwt: true
  file_upload: true
  security_headers: true
  clickjacking: true
  subdomain_takeover: true
  sensitive_files: true
  api_security: true

# ── External Tools ─────────────────────────────────────────
tools:
  nuclei:
    enabled: true
    templates: ""           # Leave empty for default templates
  subfinder:
    enabled: true
  httpx:
    enabled: true
  ffuf:
    enabled: true
    wordlist: "wordlists/common.txt"
  sqlmap:
    enabled: false          # Disabled by default (destructive)
    risk: 1
    level: 1

# ── Reporting ──────────────────────────────────────────────
reporting:
  company: "Bug Bounty Report"
  analyst: "scp2801"
  include_evidence: true
  include_screenshots: true
  cvss_scoring: true

# ── Scan Profiles ──────────────────────────────────────────
# Profile overrides (applied when --profile is set)
profiles:
  fast:
    scan:
      threads: 25
      timeout: 10
      rate_limit: 100
      delay: 0
    crawling:
      max_depth: 1
      max_pages: 100

  deep:
    scan:
      threads: 5
      timeout: 60
      rate_limit: 10
      delay: 0.5
    crawling:
      max_depth: 5
      max_pages: 2000

  stealth:
    scan:
      threads: 2
      timeout: 45
      rate_limit: 5
      delay: 2.0
      user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    crawling:
      max_depth: 2
      max_pages: 200
